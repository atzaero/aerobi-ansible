---
# Playbook: setup_valkey.yml
#
# Sobe Valkey (fork OSS do Redis) em container Docker. Serviço interno —
# sem vhost público, exposto só em 127.0.0.1 e na rede warpgate.
#
# Pré-requisitos:
#   - Docker + rede warpgate (setup_vps.yml)
#   - vault_valkey_password definido no vault Ansible (em prod)
#
# Uso:
#   ansible-playbook playbooks/setup_valkey.yml
#   ansible-playbook -i inventory/dev playbooks/setup_valkey.yml

- name: Configurar Valkey (cache em memória)
  hosts: all
  become: yes
  roles:
    - role: valkey
