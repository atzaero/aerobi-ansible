---
# Playbook: setup_forgejo.yml
#
# Provisiona o Forgejo (Git forge self-hosted + Actions) na VPS:
#   1. Cria banco de dados PostgreSQL dedicado (reusa o postgres existente)
#   2. Sobe o container Forgejo (cache no Valkey, sessão no Postgres)
#   3. Cria o usuário admin inicial
#
# A exposição pública (Nginx + SSL) é feita SEPARADAMENTE depois, via
# setup_app.yml — mesmo padrão de minio/sftpgo/uptime_kuma.
#
# Decisão arquitetural: docs/research/forgejo.md (issue #96). Execução: #100.
#
# PRÉ-REQUISITOS:
#   1. setup_vps.yml executado (Docker, Nginx, Firewall)
#   2. setup_database.yml executado (PostgreSQL rodando)
#   3. setup_valkey.yml executado (Valkey rodando — cache)
#   4. DNS: git.aerobi.com.br → A → 187.127.6.20 (necessário só p/ o vhost)
#   5. Vault configurado com:
#        vault_forgejo_db_password    — senha do banco PostgreSQL
#        vault_forgejo_admin_password — senha do usuário admin inicial
#
# Como adicionar os secrets ao vault (per-value encryption):
#   echo -n "$(openssl rand -hex 32)" | \
#     ansible-vault encrypt_string --stdin-name 'vault_forgejo_db_password' \
#     --vault-id default@~/.ansible-vault/aerobi-prod \
#     >> inventory/prod/group_vars/all/vault.yml
#   # repetir para vault_forgejo_admin_password (use rand -base64 24 p/ digitável)
#
# Uso:
#   ansible-playbook -i inventory/prod playbooks/setup_forgejo.yml
#
# Após execução, expor com TLS:
#   ansible-playbook playbooks/setup_app.yml \
#     -e "app_name=forgejo app_domain=git.aerobi.com.br app_port=3020 \
#         vhost_websocket_enabled=true vhost_client_max_body_size=1g"

- name: Provisionar Forgejo
  hosts: all
  become: yes

  pre_tasks:
    - name: Validar variáveis obrigatórias
      fail:
        msg: >
          A variável '{{ item }}' é obrigatória.
          Adicione ao vault: ansible-vault edit inventory/prod/group_vars/all/vault.yml
      when: vars[item] | default('') == ''
      loop:
        - forgejo_domain
        - vault_forgejo_db_password
        - vault_forgejo_admin_password

    - name: Exibir configuração que será aplicada
      debug:
        msg:
          - "============================================"
          - "  Provisionando Forgejo"
          - "============================================"
          - "  Domínio  : {{ forgejo_domain }}"
          - "  Porta    : {{ forgejo_http_port }} (host) -> {{ forgejo_internal_port }} (container)"
          - "  Banco    : {{ forgejo_db_name }} (postgres existente)"
          - "  Cache    : valkey/{{ forgejo_cache_db_index }} | Sessão: {{ forgejo_session_provider }}"
          - "  Container: {{ forgejo_container_name }}"
          - "  Rede     : {{ docker_network_name }}"
          - "============================================"

    - name: Provisionar banco de dados Forgejo no PostgreSQL
      include_role:
        name: postgres_databases
      vars:
        postgres_apps:
          - name: forgejo
            db: "{{ forgejo_db_name }}"
            user: "{{ forgejo_db_user }}"
            password: "{{ forgejo_db_password }}"

  roles:
    - role: forgejo

  post_tasks:
    - name: Verificar saúde do container
      community.docker.docker_container_info:
        name: "{{ forgejo_container_name }}"
      register: forgejo_info

    - name: Exibir status do container
      debug:
        msg: "Status: {{ forgejo_info.container.State.Status }} | Health: {{ forgejo_info.container.State.Health.Status | default('N/A') }}"

    - name: Exibir resumo final
      debug:
        msg:
          - "============================================"
          - "  Forgejo provisionado com sucesso!"
          - "============================================"
          - "  Container : {{ forgejo_container_name }} ({{ forgejo_version }})"
          - "  Admin     : {{ forgejo_admin_user }} / {{ forgejo_admin_email }}"
          - "============================================"
          - "  Próximo passo OBRIGATÓRIO — expor via Nginx + TLS:"
          - "  ansible-playbook playbooks/setup_app.yml \\"
          - "    -e \"app_name=forgejo app_domain={{ forgejo_domain }} app_port={{ forgejo_http_port }} \\"
          - "        vhost_websocket_enabled=true vhost_client_max_body_size=1g\""
          - "--------------------------------------------"
          - "  Depois:"
          - "  1. Acesse https://{{ forgejo_domain }} e logue como {{ forgejo_admin_user }}"
          - "  2. Crie a organização e o primeiro repositório"
          - "  3. Gere um Personal Access Token (Settings -> Applications)"
          - "  4. Adicione um monitor no Uptime Kuma: /api/healthz"
          - "============================================"
