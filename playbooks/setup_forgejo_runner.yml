---
# Playbook: setup_forgejo_runner.yml
#
# Sobe o Forgejo Actions Runner (motor de CI) e registra na instância.
# Os jobs rodam no Docker do host (socket montado) — build, service
# containers de teste e deploy na warpgate, sem SSH.
#
# Decisão arquitetural: docs/research/forgejo.md (issue #100).
#
# PRÉ-REQUISITOS:
#   1. setup_forgejo.yml aplicado (Forgejo rodando, Actions habilitado)
#   2. Docker + rede warpgate
#
# Registro: token efêmero gerado em apply-time (sem secret no vault).
#
# Uso:
#   ansible-playbook -i inventory/prod playbooks/setup_forgejo_runner.yml
#
# Após aplicar, validar em Site Admin -> Actions -> Runners (vps-runner online)
# e disparar um workflow de teste (ver docs/GITHUB_ACTIONS.md).

- name: Provisionar Forgejo Actions Runner
  hosts: all
  become: yes

  pre_tasks:
    - name: Exibir configuração que será aplicada
      debug:
        msg:
          - "============================================"
          - "  Provisionando Forgejo Runner"
          - "============================================"
          - "  Nome      : {{ forgejo_runner_name }}"
          - "  Instância : {{ forgejo_runner_instance_url }}"
          - "  Capacidade: {{ forgejo_runner_capacity }} job(s) simultâneo(s)"
          - "  Docker    : socket do host (jobs na warpgate)"
          - "============================================"

  roles:
    - role: forgejo_runner

  post_tasks:
    - name: Confirmar runner registrado na instância
      community.docker.docker_container_info:
        name: "{{ forgejo_runner_container_name }}"
      register: _runner_info

    - name: Exibir resumo final
      debug:
        msg:
          - "============================================"
          - "  Forgejo Runner provisionado!"
          - "============================================"
          - "  Container : {{ forgejo_runner_container_name }} ({{ forgejo_runner_version }})"
          - "  Status    : {{ _runner_info.container.State.Status }}"
          - "============================================"
          - "  Validar:"
          - "  1. Site Admin -> Actions -> Runners: vps-runner online"
          - "  2. Smoke test: push de .forgejo/workflows/smoke.yml num repo"
          - "  3. Acompanhar a run na aba Actions do repo"
          - "============================================"
