---
# Playbook: cleanup_forgejo.yml
#
# One-shot DESTRUTIVO: remove Forgejo + Forgejo Runner da VPS.
# Para containers, dropa banco e usuário do Postgres, esvazia o cache no
# Valkey, remove o vhost do Nginx e o certificado Let's Encrypt.
#
# Por default NÃO apaga /home/deploy/forgejo* (dados em disco) — exige
# `-e cleanup_data_dirs=true` para isso. Isso dá janela de rollback rápido
# caso algo dê errado: o postgres dump dos repos fica intacto no host.
#
# Issue: atzaero/aerobi-ansible#110 (Fase A).
#
# Pré-requisito:
#   - Forgejo provisionado anteriormente via setup_forgejo.yml / setup_forgejo_runner.yml.
#   - Containers postgres + valkey rodando (vão sobreviver — só dropamos o que é do Forgejo).
#
# Uso:
#   # Apenas containers + DB + vhost + cert (data dirs preservados):
#   ansible-playbook -i inventory/prod playbooks/cleanup_forgejo.yml
#
#   # Para também apagar /home/deploy/forgejo*:
#   ansible-playbook -i inventory/prod playbooks/cleanup_forgejo.yml -e cleanup_data_dirs=true
#
# Após este playbook (manual):
#   - Registro.br: remover registro A `git.aerobi.com.br` (não há automação).
#   - Remover role + playbook + inventory + docs no repo (Fase B do #110).

- name: Remover Forgejo da VPS (destrutivo)
  hosts: all
  become: yes

  vars:
    cleanup_data_dirs: false
    forgejo_container_name: forgejo
    forgejo_runner_container_name: forgejo-runner
    forgejo_db_name: forgejo
    forgejo_db_user: forgejo_user
    forgejo_cache_db_index: 3
    forgejo_domain: "git.aerobi.com.br"
    forgejo_nginx_vhost_name: forgejo

  pre_tasks:
    - name: Exibir o que será removido
      debug:
        msg:
          - "============================================"
          - "  REMOÇÃO DESTRUTIVA do Forgejo"
          - "============================================"
          - "  Containers     : {{ forgejo_container_name }}, {{ forgejo_runner_container_name }}"
          - "  Postgres DB    : {{ forgejo_db_name }} (CASCADE)"
          - "  Postgres user  : {{ forgejo_db_user }}"
          - "  Valkey db idx  : {{ forgejo_cache_db_index }} (FLUSHDB)"
          - "  Nginx vhost    : {{ forgejo_nginx_vhost_name }}"
          - "  Certbot        : {{ forgejo_domain }}"
          - "  Data dirs (rm) : {{ cleanup_data_dirs }}"
          - "============================================"

  tasks:
    # ----------------------------------------------------------------
    # Containers
    # ----------------------------------------------------------------
    - name: Parar e remover container forgejo-runner
      community.docker.docker_container:
        name: "{{ forgejo_runner_container_name }}"
        state: absent

    - name: Parar e remover container forgejo
      community.docker.docker_container:
        name: "{{ forgejo_container_name }}"
        state: absent

    # ----------------------------------------------------------------
    # Nginx vhost
    # ----------------------------------------------------------------
    - name: Remover symlink em sites-enabled
      file:
        path: "/etc/nginx/sites-enabled/{{ forgejo_nginx_vhost_name }}"
        state: absent

    - name: Remover vhost em sites-available
      file:
        path: "/etc/nginx/sites-available/{{ forgejo_nginx_vhost_name }}"
        state: absent

    - name: Validar configuração do Nginx
      command: nginx -t
      changed_when: false

    - name: Recarregar Nginx
      service:
        name: nginx
        state: reloaded

    # ----------------------------------------------------------------
    # Certbot — Let's Encrypt
    # ----------------------------------------------------------------
    # Idempotente: se o cert já foi removido antes, certbot retorna != 0
    # com "No certificate found" — tratamos como sucesso.
    - name: Remover certificado Let's Encrypt do Forgejo
      command: >
        certbot delete --cert-name {{ forgejo_domain }} --non-interactive
      register: _certbot_delete
      failed_when:
        - _certbot_delete.rc != 0
        - "'No certificate found' not in (_certbot_delete.stderr | default(''))"
        - "'No certificate found' not in (_certbot_delete.stdout | default(''))"
      changed_when: _certbot_delete.rc == 0

    # ----------------------------------------------------------------
    # PostgreSQL — drop DB + user
    # ----------------------------------------------------------------
    # forgejo_user só é dono de objetos dentro do DB forgejo, então DROP
    # DATABASE + DROP USER basta (sem REASSIGN OWNED). DROP DATABASE com
    # IF EXISTS é idempotente; se houver conexão ativa, o forgejo container
    # já foi removido acima, então não deve sobrar.
    - name: Dropar banco de dados forgejo
      shell: |
        docker exec {{ postgres_container_name }} \
          psql -U {{ postgres_user }} -d {{ postgres_db }} \
          -c "DROP DATABASE IF EXISTS {{ forgejo_db_name }};"
      register: _drop_db
      changed_when: "'DROP DATABASE' in (_drop_db.stdout | default(''))"

    - name: Dropar usuário forgejo_user do Postgres
      shell: |
        docker exec {{ postgres_container_name }} \
          psql -U {{ postgres_user }} -d {{ postgres_db }} \
          -c "DROP USER IF EXISTS {{ forgejo_db_user }};"
      register: _drop_user
      changed_when: "'DROP ROLE' in (_drop_user.stdout | default(''))"

    # ----------------------------------------------------------------
    # Valkey — FLUSHDB no índice do cache (descartável)
    # ----------------------------------------------------------------
    - name: FLUSHDB no Valkey db {{ forgejo_cache_db_index }} (cache do Forgejo)
      shell: |
        docker exec valkey valkey-cli -a "{{ valkey_password }}" \
          -n {{ forgejo_cache_db_index }} FLUSHDB
      no_log: true
      changed_when: false

    # ----------------------------------------------------------------
    # Data dirs (opt-in via -e cleanup_data_dirs=true)
    # ----------------------------------------------------------------
    - name: Remover /home/{{ deploy_user }}/forgejo (data dir)
      file:
        path: "/home/{{ deploy_user }}/forgejo"
        state: absent
      when: cleanup_data_dirs | bool

    - name: Remover /home/{{ deploy_user }}/forgejo-runner (data dir)
      file:
        path: "/home/{{ deploy_user }}/forgejo-runner"
        state: absent
      when: cleanup_data_dirs | bool

  post_tasks:
    - name: Resumo final
      debug:
        msg:
          - "============================================"
          - "  Forgejo removido da VPS."
          - "============================================"
          - "  Containers, vhost, cert, DB e cache: removidos."
          - "  Data dirs em /home/{{ deploy_user }}/forgejo*:"
          - "    {{ 'REMOVIDOS' if cleanup_data_dirs else 'PRESERVADOS (rollback possível)' }}"
          - "--------------------------------------------"
          - "  Manual ainda pendente:"
          - "  - Registro.br: remover registro A {{ forgejo_domain }}"
          - "  - Repo: rodar PR da Fase B (#110) p/ apagar role + docs"
          - "============================================"
