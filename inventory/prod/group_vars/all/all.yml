---
# Variáveis — Ambiente de Produção
#
# Configurações restritivas de segurança para o servidor principal.

# ------------------------------------------------------------
# Usuário de deploy
# ------------------------------------------------------------
deploy_user: deploy
deploy_email: eleram@protonmail.com
ansible_become_password: "{{ vault_deploy_password }}"

# Chaves SSH autorizadas para o usuário de deploy.
# Chaves públicas podem ser versionadas (não são segredos).
# Cada entrada é adicionada ao ~/.ssh/authorized_keys do usuário deploy.
#
# Como adicionar uma nova chave:
#   1. Gerar par de chaves: ssh-keygen -t ed25519 -C "descricao"
#   2. Adicionar a chave pública aqui com um comentário claro
#   3. Aplicar: ansible-playbook playbooks/setup_vps.yml --tags user
#
# Como revogar uma chave:
#   1. Remover a entrada desta lista
#   2. Aplicar o playbook novamente
#
deploy_ssh_authorized_keys:
  # Chave do desenvolvedor principal — acesso manual via terminal
  - comment: "Desenvolvedor — elvisea"
    key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK5bRdeE7J6YR8GKdRUrEzrv57edB36jowlh7ReD7bRH eleram@protonmail.com"

  # Chave dedicada para GitHub Actions (CI/CD).
  # A chave PRIVADA correspondente deve ser armazenada como Secret no GitHub:
  #   Repositório → Settings → Secrets → Actions → SSH_PRIVATE_KEY
  # Gerada com: ssh-keygen -t ed25519 -C "github-actions-cicd" -f cicd_key -N ""
  - comment: "GitHub Actions — CI/CD deploy"
    key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICSkegyGRijW9bBeNMch7vYbjl+Wc6Yqsti4KIjq/arY github-actions-cicd"

# ------------------------------------------------------------
# SSH
# ------------------------------------------------------------
ssh_port: 22
ssh_max_auth_tries: 3
ssh_permit_root_login: "no"
ssh_password_authentication: "no"

# ------------------------------------------------------------
# Firewall (UFW) — apenas portas essenciais
# ------------------------------------------------------------
ufw_allowed_ports:
  - 22
  - 80
  - 443

# Portas UDP — Tailscale/WireGuard usam 41641 para handshake P2P
ufw_allowed_udp_ports:
  - 41641

# Tráfego entre nós da tailnet é confiável (ACLs aplicadas pelo Headscale).
# Liberar a interface tailscale0 inteira evita criar regra por porta para
# cada novo serviço acessível via VPN.
ufw_allow_tailscale_interface: true

# ------------------------------------------------------------
# Fail2Ban — mais restritivo em prod
# ------------------------------------------------------------
fail2ban_bantime: 3600         # 1 hora de ban
fail2ban_maxretry: 3           # apenas 3 tentativas
fail2ban_findtime: 600

# ------------------------------------------------------------
# Diretórios
# ------------------------------------------------------------
deploy_directories:
  - apps
  - databases
  - scripts
  - backups

# ------------------------------------------------------------
# Docker
# ------------------------------------------------------------
docker_network_name: warpgate

# ------------------------------------------------------------
# PostgreSQL
# ------------------------------------------------------------
postgres_version: "17"
postgres_container_name: postgres
postgres_port: 5432
postgres_volume_name: postgres_data
postgres_db: postgres
postgres_user: postgres
# Senha definida no vault — nunca commitar senhas
# ansible-vault edit inventory/prod/group_vars/vault.yml
postgres_password: "{{ vault_postgres_password }}"

# Performance (ajuste conforme RAM da VPS)
postgres_max_connections: 100
postgres_shared_buffers: 256MB
postgres_work_mem: 4MB
postgres_maintenance_work_mem: 64MB

# ------------------------------------------------------------
# Bancos de dados por aplicação
# ------------------------------------------------------------
# Cada entrada gera: banco, usuário e privilégios no PostgreSQL.
# Senhas definidas no vault — nunca commitar em texto claro.
# Para adicionar uma app nova: adicionar entrada aqui + senha no vault.
postgres_apps:
  - name: aerobi
    db: aerobi
    user: aerobi_user
    password: "{{ vault_aerobi_db_password }}"

  - name: vaultwarden
    db: vaultwarden
    user: vaultwarden_user
    password: "{{ vault_vaultwarden_db_password }}"

  - name: headscale
    db: headscale
    user: headscale_user
    password: "{{ vault_headscale_db_password }}"

# ------------------------------------------------------------
# Vaultwarden — cofre de senhas da equipe
# ------------------------------------------------------------
# Domínio: configure o DNS antes de rodar o playbook
# Ex: vault.aerobi.com.br → A → 187.127.6.20
#
# Vault — adicione estas variáveis antes de executar:
#   ansible-vault edit inventory/prod/group_vars/all/vault.yml
#     vault_vaultwarden_admin_token: "<hash argon2 ou token plain>"
#     vault_vaultwarden_db_password: "<senha forte>"
#     vault_vaultwarden_smtp_password: "<senha smtp, se usar>"
#
vaultwarden_domain: "vault.aerobi.com.br"   # ajuste para o seu domínio
vaultwarden_container_name: vaultwarden
vaultwarden_port: 3010
vaultwarden_volume_name: vaultwarden_data
vaultwarden_db: vaultwarden
vaultwarden_db_user: vaultwarden_user
vaultwarden_db_password: "{{ vault_vaultwarden_db_password }}"

# Cadastro público desabilitado — equipe acessa apenas por convite
vaultwarden_signups_allowed: "false"
vaultwarden_signups_verify: "true"
vaultwarden_invitations_allowed: "true"
vaultwarden_org_creation_users: ""       # vazio = qualquer usuário logado
vaultwarden_sends_allowed: "true"
vaultwarden_emergency_access_allowed: "true"
vaultwarden_log_level: "warn"

# SMTP — Google Workspace via smtp.gmail.com
vaultwarden_smtp_host: "smtp.gmail.com"
vaultwarden_smtp_port: "587"
vaultwarden_smtp_security: "starttls"
vaultwarden_smtp_from: "admin@aerobi.com.br"
vaultwarden_smtp_username: "admin@aerobi.com.br"

# ------------------------------------------------------------
# Headscale — control plane VPN self-hosted (issue #5)
# ------------------------------------------------------------
# Domínio: configure o DNS antes de rodar o playbook
# Ex: headscale.aerobi.com.br → A → 187.127.6.20
#
# Vault — adicione antes de aplicar:
#   ansible-vault edit inventory/prod/group_vars/all/vault.yml
#     vault_headscale_db_password: "<senha forte>"
#     vault_headscale_authkey_vps: ""   # preenchido depois (ver abaixo)
#
# Após o primeiro deploy do Headscale, gerar pre-auth key:
#   docker exec headscale headscale preauthkeys create \
#     --user aerobi --reusable --expiration 90d --tags tag:vps
# Salvar no vault como vault_headscale_authkey_vps e re-aplicar.
#
headscale_domain: "headscale.aerobi.com.br"
headscale_user_name: aerobi

# ------------------------------------------------------------
# Valkey — cache + filas + sessões (fork OSS do Redis)
# ------------------------------------------------------------
# Apps consomem via rede warpgate: redis://default:<senha>@valkey:6379
# Sem vhost público — acesso só interno entre containers.
#
# Vault — adicione antes de rodar `ansible-playbook playbooks/setup_valkey.yml`:
#   echo -n "$(openssl rand -hex 32)" | \
#     ansible-vault encrypt_string --stdin-name 'vault_valkey_password' \
#     --vault-id default@~/.ansible-vault/aerobi-prod \
#     >> inventory/prod/group_vars/all/vault.yml
#
valkey_password: "{{ vault_valkey_password }}"
valkey_maxmemory: "512mb"

# ------------------------------------------------------------
# Tailscale client — conecta nós ao Headscale
# ------------------------------------------------------------
tailscale_tags: "tag:vps"

# ------------------------------------------------------------
# MinIO — object storage S3-compatible
# ------------------------------------------------------------
# DNS no registro.br (criar antes de aplicar setup_app.yml com vhosts):
#   s3.aerobi.com.br         → A → 187.127.6.20  (público — apps consomem)
#   s3-console.aerobi.com.br → A → 187.127.6.20  (tailnet-only — admin)
#
# Vault — adicione antes de aplicar:
#   echo -n "$(openssl rand -hex 32)" | \
#     ansible-vault encrypt_string --stdin-name 'vault_minio_root_password' \
#     --vault-id default@~/.ansible-vault/aerobi-prod \
#     >> inventory/prod/group_vars/all/vault.yml
#
# Após o playbook subir o container, expor com TLS:
#   # API pública (uploads grandes):
#   ansible-playbook playbooks/setup_app.yml \
#     -e "app_name=minio_api app_domain=s3.aerobi.com.br app_port=9000 vhost_client_max_body_size=25m"
#   # Console tailnet-only (object browser usa wss://):
#   ansible-playbook playbooks/setup_app.yml \
#     -e "app_name=minio_console app_domain=s3-console.aerobi.com.br app_port=9001 vhost_websocket_enabled=true vhost_tailnet_only=true"
#
minio_root_user: aerobi-admin
minio_root_password: "{{ vault_minio_root_password }}"
minio_bind_address: "127.0.0.1"
minio_container_uid: 1001
minio_container_gid: 1001
minio_buckets:
  - name: aerobi-prod-uploads
    public_read: false
  - name: aerobi-prod-backups
    public_read: false

# ------------------------------------------------------------
# Uptime Kuma — status + monitoring + domain expiry alerts
# ------------------------------------------------------------
# DNS no registro.br: status.aerobi.com.br → A → 187.127.6.20
# Vhost: tailnet-only (admin acessa via tailscale up no laptop).
#
# Sequência pós-merge:
#   ansible-playbook playbooks/setup_uptime_kuma.yml
#   ansible-playbook playbooks/setup_app.yml \
#     -e "app_name=uptime_kuma app_domain=status.aerobi.com.br \
#         app_port=3001 vhost_websocket_enabled=true vhost_tailnet_only=true"
#
# Primeiro monitor a configurar via UI: Domain Name Expiry → aerobi.com.br
#
uptime_kuma_domain: "status.aerobi.com.br"

# ------------------------------------------------------------
# Ambiente
# ------------------------------------------------------------
environment_name: prod
