---
# Inventário — Ambiente de Desenvolvimento
#
# VPS usada para testar configurações antes de aplicar em produção.
# Geralmente uma VPS menor e mais barata.

all:
  hosts:
    vps-dev:
      ansible_host: SEU_IP_DEV_AQUI
      ansible_user: root
      ansible_ssh_private_key_file: ~/.ssh/id_ed25519
