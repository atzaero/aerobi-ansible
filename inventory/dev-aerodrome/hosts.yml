---
# Inventory para o laboratório local em dev/aerodrome-lab/.
# Aponta para o container "raspi-sim" exposto em localhost:2222.
# Use somente com o lab Docker, não com Raspi real.

all:
  hosts:
    raspi-sim:
      ansible_host: localhost
      ansible_port: 2222
      ansible_user: deploy
      ansible_ssh_private_key_file: "{{ inventory_dir }}/../../dev/aerodrome-lab/ssh/id_ed25519"
      ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
      ansible_python_interpreter: /usr/bin/python3
