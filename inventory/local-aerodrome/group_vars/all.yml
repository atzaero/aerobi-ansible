---
# Vars do inventory local-aerodrome (modo pull).
# Mantém-se em sincronia com inventory/dev-aerodrome/group_vars/all.yml,
# pois ambos descrevem a mesma topologia (4 câmeras Intelbras simuladas).

aerodrome_id: aerobi-edge-lab

aerodrome_camera_subnets:
  - 192.168.68.91/32
  - 192.168.68.92/32
  - 192.168.68.93/32
  - 192.168.68.94/32

mediamtx_paths:
  - name: cam-1
    source: "rtsp://192.168.68.91:8554/live"
  - name: cam-2
    source: "rtsp://192.168.68.92:8554/live"
  - name: cam-3
    source: "rtsp://192.168.68.93:8554/live"
  - name: cam-4
    source: "rtsp://192.168.68.94:8554/live"

deploy_user: deploy
