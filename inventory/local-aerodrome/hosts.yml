---
# Inventory para rodar setup_aerodrome.yml DE DENTRO do próprio host alvo
# (modo pull / -c local).
#
# Uso:
#   1. Entrar no raspi-sim (lab) ou Raspi físico (produção)
#   2. cd /repo  (ou onde o aerobi-ansible foi clonado)
#   3. ansible-playbook -i inventory/local-aerodrome playbooks/setup_aerodrome.yml --skip-tags tailscale
#
# Equivalente didático ao bootstrap via cloud-init/ansible-pull.

all:
  hosts:
    localhost:
      ansible_connection: local
      ansible_python_interpreter: /usr/bin/python3
