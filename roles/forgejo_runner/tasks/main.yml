---
# Role: forgejo_runner
#
# Sobe o Forgejo Actions Runner e o registra na instância. Os jobs rodam como
# containers no Docker do HOST (socket montado) — build, service containers de
# teste e deploy na warpgate funcionam sem SSH.
#
# Registro idempotente: o token de registro é efêmero, gerado em apply-time
# via `forgejo actions generate-runner-token`, e só quando o runner ainda não
# se registrou (sem .runner no data_dir). O runner persiste a própria
# credencial no .runner — não há secret novo no vault.
#
# PRÉ-REQUISITOS:
#   - Forgejo rodando com Actions habilitado (roles forgejo)
#   - Docker + rede warpgate

# ----------------------------------------------------------------
# Pré-condições
# ----------------------------------------------------------------

- name: Verificar se o container Forgejo está rodando
  community.docker.docker_container_info:
    name: "{{ forgejo_container_name }}"
  register: _fj

- name: Falhar se o Forgejo não estiver rodando
  fail:
    msg: >
      Container '{{ forgejo_container_name }}' não está rodando.
      Execute primeiro: ansible-playbook playbooks/setup_forgejo.yml
  when: not _fj.exists or _fj.container.State.Status != 'running'

# ----------------------------------------------------------------
# Storage + config
# ----------------------------------------------------------------

- name: Garantir diretório de dados do runner
  file:
    path: "{{ forgejo_runner_data_dir }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0750"

- name: Renderizar config.yaml do runner
  template:
    src: config.yaml.j2
    dest: "{{ forgejo_runner_data_dir }}/config.yaml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0644"
  notify: Reiniciar Forgejo Runner

# ----------------------------------------------------------------
# Registro (idempotente — só se ainda não registrado)
# ----------------------------------------------------------------

- name: Verificar se o runner já está registrado (.runner)
  stat:
    path: "{{ forgejo_runner_data_dir }}/.runner"
  register: _runner_file

- name: Gerar registration token efêmero
  command: docker exec {{ forgejo_container_name }} forgejo actions generate-runner-token
  register: _reg_token
  changed_when: false
  no_log: true
  when: not _runner_file.stat.exists

- name: Registrar o runner na instância (one-shot)
  community.docker.docker_container:
    name: "{{ forgejo_runner_container_name }}-register"
    image: "{{ forgejo_runner_image }}:{{ forgejo_runner_version }}"
    state: started
    detach: false
    cleanup: true
    user: "0:0"
    networks:
      - name: "{{ docker_network_name }}"
    volumes:
      - "{{ forgejo_runner_data_dir }}:/data"
    command:
      - "/bin/forgejo-runner"
      - "register"
      - "--no-interactive"
      - "--instance"
      - "{{ forgejo_runner_instance_url }}"
      - "--token"
      - "{{ _reg_token.stdout | trim }}"
      - "--name"
      - "{{ forgejo_runner_name }}"
      - "--labels"
      - "{{ forgejo_runner_labels }}"
  no_log: true
  when: not _runner_file.stat.exists

# ----------------------------------------------------------------
# Daemon (persistente)
# ----------------------------------------------------------------

- name: Subir daemon do Forgejo Runner {{ forgejo_runner_version }}
  community.docker.docker_container:
    name: "{{ forgejo_runner_container_name }}"
    image: "{{ forgejo_runner_image }}:{{ forgejo_runner_version }}"
    state: started
    restart_policy: unless-stopped
    # Root: a imagem roda como uid 1000, que não acessa o docker.sock do host.
    # O runner já tem acesso root-equivalente via o sock, então rodar como root
    # não amplia o risco e evita ginástica de GID do grupo docker.
    user: "0:0"
    command:
      - "/bin/forgejo-runner"
      - "daemon"
      - "--config"
      - "/data/config.yaml"
    volumes:
      - "{{ forgejo_runner_data_dir }}:/data"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - name: "{{ docker_network_name }}"
    security_opts:
      - "no-new-privileges:true"
  notify: Reiniciar Forgejo Runner
