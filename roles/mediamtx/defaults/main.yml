---
# Defaults: mediamtx

# Versão a instalar. Releases: https://github.com/bluenviron/mediamtx/releases
# Validar que o asset linux_arm64v8 existe na release antes de bumpar
# (releases antigas podem ter o tarball removido).
mediamtx_version: v1.18.1

# Portas
mediamtx_hls_port: 8888

# Endereço de bind do HLS. Default ":porta" = todas as interfaces.
# A proteção de borda é feita pelo firewall (UFW deny-default + libera só
# tailscale0), então o HLS só é alcançável via tailnet mesmo com bind em
# todas as interfaces. Para defesa em profundidade, sobrescreva por host
# com o IP do tailscale0 do aeródromo, ex (host_vars):
#   mediamtx_hls_address: "100.x.y.z:{{ mediamtx_hls_port }}"
# (NÃO usar no lab/CI — o IP do tailnet só existe no Raspi real.)
mediamtx_hls_address: ":{{ mediamtx_hls_port }}"

# Lista de paths que mediamtx deve servir.
# Cada item: { name: <stream-name>, source: <url-rtsp> }
# Exemplo:
#   - name: cam-1
#     source: rtsp://admin:senha@192.168.68.91:554/cam/realmonitor?channel=1&subtype=0
mediamtx_paths: []

# Comportamento "on demand": só conecta na câmera quando alguém pede o stream.
# IMPORTANTE: manter true por padrão. Sem on-demand, o mediamtx mantém uma
# sessão RTSP TCP aberta 24/7 com cada câmera mesmo sem viewer — tráfego LAN
# constante (~16 Mbps com 4 câmeras 1080p) e ocupa as sessões RTSP limitadas
# da câmera Intelbras. Lição aprendida em 2026-05-07: instalação manual sem
# essa flag bombou a rede do aeródromo MVP até ser corrigida.
# Override por aeródromo (NVR que precisa gravação contínua, p.ex.) é OK no host_vars.
mediamtx_source_on_demand: true
mediamtx_source_on_demand_start_timeout: 10s
mediamtx_source_on_demand_close_after: 10s

# HLS settings
mediamtx_hls_segment_count: 7
mediamtx_hls_segment_duration: 1s
mediamtx_hls_variant: fmp4
# CORS allowlist do HLS.
# TODO(security): restringir para a origem real do backend Aerobi quando
# definida (ex: ["https://app.aerobi.com.br"]). Hoje fica "*" porque o
# consumo é server-side via tailnet (sem header Origin) e a origem do
# backend não está parametrizada no repo. O controle de acesso efetivo é
# feito pelo firewall (deny-default + só tailscale0), não pelo CORS.
mediamtx_hls_allow_origins:
  - "*"

# Hardening systemd
mediamtx_systemd_no_new_privileges: true
mediamtx_systemd_protect_system: strict
mediamtx_systemd_protect_home: true
