---
# Role: mediamtx
#
# Instala mediamtx (binário Go) como serviço systemd no Raspberry Pi.
# Faz fan-out RTSP→HLS das câmeras IP locais, exposto na porta `mediamtx_hls_port`
# (default 8888) via tailnet.
#
# Variáveis principais (ver defaults/main.yml):
#   - mediamtx_version
#   - mediamtx_paths       (lista de { name, source } — câmeras a puxar)
#   - mediamtx_hls_port

- name: "Detectar arquitetura do mediamtx"
  ansible.builtin.set_fact:
    mediamtx_arch: >-
      {{ {
          'x86_64':  'amd64',
          'aarch64': 'arm64v8',
          'armv7l':  'armv7'
        }[ansible_architecture] | default('amd64') }}

- name: "Verificar versão atual do mediamtx (se existir)"
  ansible.builtin.command: /usr/local/bin/mediamtx --version
  register: mediamtx_installed
  changed_when: false
  failed_when: false
  check_mode: false

- name: "Instalar/atualizar binário do mediamtx"
  when:
    - mediamtx_installed.rc != 0 or mediamtx_version not in (mediamtx_installed.stdout | default(''))
  block:
    - name: "Baixar tarball mediamtx {{ mediamtx_version }} ({{ mediamtx_arch }})"
      ansible.builtin.get_url:
        url: "https://github.com/bluenviron/mediamtx/releases/download/{{ mediamtx_version }}/mediamtx_{{ mediamtx_version }}_linux_{{ mediamtx_arch }}.tar.gz"
        dest: "/tmp/mediamtx-{{ mediamtx_version }}.tar.gz"
        mode: "0644"
        force: true

    - name: "Extrair tarball"
      ansible.builtin.unarchive:
        src: "/tmp/mediamtx-{{ mediamtx_version }}.tar.gz"
        dest: /tmp/
        remote_src: true

    - name: "Instalar binário em /usr/local/bin"
      ansible.builtin.copy:
        src: /tmp/mediamtx
        dest: /usr/local/bin/mediamtx
        mode: "0755"
        owner: root
        group: root
        remote_src: true
      notify: restart mediamtx

    - name: "Limpar tarball baixado"
      ansible.builtin.file:
        path: "/tmp/mediamtx-{{ mediamtx_version }}.tar.gz"
        state: absent

- name: "Criar usuário de sistema mediamtx"
  ansible.builtin.user:
    name: mediamtx
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/mediamtx
    create_home: false

- name: "Criar diretório de configuração"
  ansible.builtin.file:
    path: /etc/mediamtx
    state: directory
    owner: mediamtx
    group: mediamtx
    mode: "0755"

- name: "Renderizar /etc/mediamtx/mediamtx.yml"
  ansible.builtin.template:
    src: mediamtx.yml.j2
    dest: /etc/mediamtx/mediamtx.yml
    owner: mediamtx
    group: mediamtx
    mode: "0644"
  notify: restart mediamtx

- name: "Instalar systemd unit"
  ansible.builtin.template:
    src: mediamtx.service.j2
    dest: /etc/systemd/system/mediamtx.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart mediamtx

- name: "Habilitar e iniciar mediamtx"
  ansible.builtin.systemd:
    name: mediamtx
    enabled: true
    state: started
    daemon_reload: true
