---
# Role: nginx_vhost
#
# Responsabilidade: configurar um virtual host Nginx como reverse proxy
# para uma aplicação rodando em container Docker, e emitir certificado
# SSL via Certbot (Let's Encrypt).
#
# Pré-requisitos:
#   - Nginx instalado (role: nginx)
#   - Porta 80 e 443 abertas no firewall (role: firewall)
#   - Domínio apontando para o IP do servidor
#
# Variáveis obrigatórias (definir no playbook):
#   - vhost_domain   : domínio público (ex: elvisea.dev)
#   - vhost_port     : porta interna do container (ex: 3003)
#   - vhost_app_name : identificador da app (ex: elvisea_portfolio)

- name: Validar variáveis obrigatórias
  fail:
    msg: "A variável '{{ item }}' é obrigatória e não foi definida."
  when: vars[item] | default('') == ''
  loop:
    - vhost_domain
    - vhost_app_name

- name: Instalar Certbot e plugin Nginx
  apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present
    update_cache: yes

- name: Criar diretório da aplicação em /home/{{ deploy_user }}/apps
  file:
    path: "/home/{{ deploy_user }}/apps/{{ vhost_app_name }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"

- name: Criar virtual host Nginx para {{ vhost_domain }}
  template:
    src: vhost.conf.j2
    dest: "/etc/nginx/sites-available/{{ vhost_app_name }}"
    owner: root
    group: root
    mode: "0644"
  notify: Recarregar Nginx

- name: Habilitar virtual host {{ vhost_app_name }}
  file:
    src: "/etc/nginx/sites-available/{{ vhost_app_name }}"
    dest: "/etc/nginx/sites-enabled/{{ vhost_app_name }}"
    state: link
  notify: Recarregar Nginx

- name: Testar configuração do Nginx
  command: nginx -t
  changed_when: false

- name: Recarregar Nginx antes de emitir certificado
  meta: flush_handlers

- name: Montar lista de domínios (-d) para o Certbot
  # Domínio principal + aliases (ex: www). Vira um único cert SAN.
  set_fact:
    certbot_domain_args: >-
      -d {{ ([vhost_domain] + (vhost_server_aliases | default([]))) | join(' -d ') }}
  when: vhost_emit_cert | default(true) | bool

- name: Emitir e (re)instalar certificado SSL via Certbot para {{ vhost_domain }}
  # --reinstall garante que o vhost sempre recebe o bloco `listen 443 ssl;`
  # mesmo quando o cert já existe (idempotente — não re-emite cert válido).
  # Sem --reinstall, observamos no projeto fonte (2026-04-24) casos de
  # vhost sem bloco SSL após first run da role em VPS fresh: certbot
  # emitia o cert mas o arquivo em /etc/nginx/sites-available/ ficava
  # apenas com `listen 80;`. --reinstall + remoção de `creates:` elimina
  # o race.
  #
  # vhost_emit_cert=false pula esta task: cria só o vhost HTTP (listen 80),
  # necessário antes do flip de DNS num cutover de apex (HTTP-01 só valida
  # depois que o domínio resolve para a VPS). Ver docs/DEPLOY_APP.md.
  command: >
    certbot --nginx
    {{ certbot_domain_args }}
    --non-interactive
    --agree-tos
    -m {{ deploy_email }}
    --redirect
    --reinstall
  when: vhost_emit_cert | default(true) | bool
