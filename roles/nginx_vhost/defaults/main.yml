---
# Role: nginx_vhost
#
# Variáveis com valores padrão.
# Todas devem ser sobrescritas no playbook ou vars do inventário.

# Domínio público da aplicação
vhost_domain: ""

# Porta interna onde o container/processo escuta
vhost_port: 3000

# Nome identificador da aplicação (usado para nomear arquivos e diretório)
vhost_app_name: ""

# ------------------------------------------------------------
# Parâmetros opcionais — só ativam se passados via -e ou role vars.
# Não definimos default aqui para que o template use `is defined` /
# `default(false)` e omita as diretivas quando não setados.
# ------------------------------------------------------------
#
# vhost_websocket_enabled: false
#   Quando true, adiciona Upgrade/Connection upgrade ao upstream.
#   Necessário para apps com WebSocket: Vaultwarden /notifications/hub,
#   MinIO console (object browser), Uptime Kuma (dashboard live).
#
# vhost_client_max_body_size: "25m"
#   Override do default 1m do nginx. Necessário para apps com upload
#   grande: MinIO API (objetos), endpoints de import/export.
#
# vhost_tailnet_only: false
#   Quando true, restringe o vhost ao range CGNAT da tailnet
#   (100.64.0.0/10) + localhost. Externo retorna 403. Padrão para
#   serviços admin-only (MinIO console, Uptime Kuma).
