---
# Role: uptime_kuma
#
# Sobe Uptime Kuma (status page + monitoring self-hosted) em container Docker.
# O vhost + TLS é provisionado separadamente via setup_app.yml com
# `vhost_websocket_enabled=true vhost_tailnet_only=true` (admin-only,
# acesso via tailnet).
#
# Pré-requisitos:
#   - Docker + rede warpgate (setup_vps.yml)
#
# Variáveis obrigatórias:
#   - uptime_kuma_domain : domínio público (ex: status.aerobi.com.br)
#
# Segurança:
#   - Container exposto só em 127.0.0.1 — público via nginx + TLS
#   - Vhost recomendado: vhost_tailnet_only=true (admin-only)
#   - Primeira request à UI exige criar conta admin (signup só roda 1 vez)
#   - Após primeiro signup, signup público fica desabilitado automaticamente
#   - Volume Docker nomeado — dados gerenciados pelo daemon, sem chown manual

- name: Validar variável obrigatória uptime_kuma_domain
  fail:
    msg: >
      uptime_kuma_domain não definido. Configure em
      inventory/<env>/group_vars/all/all.yml.
  when: uptime_kuma_domain | default('') == ''

- name: Garantir volume de dados do Uptime Kuma
  community.docker.docker_volume:
    name: "{{ uptime_kuma_volume_name }}"
    state: present

- name: Subir container Uptime Kuma {{ uptime_kuma_version }}
  community.docker.docker_container:
    name: "{{ uptime_kuma_container_name }}"
    image: "{{ uptime_kuma_image }}:{{ uptime_kuma_version }}"
    state: started
    restart_policy: unless-stopped
    ports:
      # Localhost only — público via nginx + TLS (setup_app.yml).
      - "127.0.0.1:{{ uptime_kuma_port }}:3001"
    volumes:
      - "{{ uptime_kuma_volume_name }}:/app/data"
    networks:
      - name: "{{ docker_network_name }}"
    security_opts:
      - "no-new-privileges:true"
    # Healthcheck herdado do Dockerfile oficial (/extra/healthcheck) —
    # não sobrescrever pra evitar regressão se upstream mudar.

- name: Aguardar Uptime Kuma responder em 127.0.0.1:{{ uptime_kuma_port }}
  wait_for:
    host: 127.0.0.1
    port: "{{ uptime_kuma_port }}"
    delay: 5
    timeout: 60
    msg: "Uptime Kuma não respondeu na porta {{ uptime_kuma_port }} em 60s"

- name: Exibir resumo do Uptime Kuma
  debug:
    msg:
      - "============================================"
      - "  Uptime Kuma provisionado com sucesso!"
      - "============================================"
      - "  Local       : http://127.0.0.1:{{ uptime_kuma_port }}"
      - "  Versão      : {{ uptime_kuma_version }}"
      - "  Domínio     : {{ uptime_kuma_domain }} (vhost via setup_app.yml)"
      - "  Volume      : {{ uptime_kuma_volume_name }} (Docker volume)"
      - "--------------------------------------------"
      - "  Próximo passo (vhost tailnet-only + TLS):"
      - "    ansible-playbook playbooks/setup_app.yml \\"
      - "      -e \"app_name=uptime_kuma app_domain={{ uptime_kuma_domain }} \\"
      - "          app_port={{ uptime_kuma_port }} \\"
      - "          vhost_websocket_enabled=true vhost_tailnet_only=true\""
      - "--------------------------------------------"
      - "  Primeiro acesso (com tailscale up): https://{{ uptime_kuma_domain }}"
      - "  Criar a conta admin (signup só roda 1x — depois é bloqueado)."
      - "============================================"
