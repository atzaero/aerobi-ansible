  - repo: atzaero/aerobi-ansible
    title: "feat(headscale): rotação automática de pre-auth keys com alerta 7d antes da expiração"
    labels: [automation, headscale, priority-high]
    milestone: "Automações backlog"
    body: |
      ## Contexto

      Pre-auth keys (ex: `vault_headscale_authkey_vps`) expiram em 90 dias. Esquecer = VPS reiniciada não reconecta na tailnet. Hoje rotação é 100% manual.

      ## Escopo

      - Cron semanal lista keys via `headscale preauthkeys list`
      - Para cada key com `expiration < now + 7d`, gera key nova e atualiza vault + Vaultwarden
      - Push alerta 7d antes da expiração (não bloqueante)
      - Auto-renova keys reusable de servidores (ex: VPS, edge)

      ## Critério de aceite

      - [ ] Script + cron + alerta provisionados
      - [ ] Rotação testada manualmente em dev
      - [ ] Vault.yml e Vaultwarden atualizados após rotação
      - [ ] Documentado em `docs/automacoes/headscale.md`

      ## Esforço / Impacto

      Médio / Alto

      ## Referências

