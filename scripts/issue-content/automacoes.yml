    labels: [automation, vaultwarden, priority-medium]
    milestone: "Automações backlog"
    body: |
      ## Contexto

      Hoje `aerobi-api` lê secrets de `.env` no disco da VPS. Rotacionar senha = redeploy. Com `bw` ou SDK, lê do Vaultwarden, cache em memória, refresh on signal.

      ## Escopo

