  - repo: atzaero/aerobi-ansible
    title: "feat(vaultwarden): backup diário do volume vaultwarden_data no MinIO"
    labels: [automation, vaultwarden, priority-high]
    milestone: "Automações backlog"
    body: |
      ## Contexto

      Volume `vaultwarden_data` tem o DB com todos os items do cofre da org Aerobi. Hoje sem backup automatizado: perda do volume = perda do cofre. RTO indefinido.

      ## Escopo

      - Cron diário 03:00 na VPS gerando tarball do volume
      - Upload para bucket `aerobi-prod-backups/vaultwarden/`
      - Retenção 30 dias (auto-purge via `mc find --older-than`)
      - Push monitor no Uptime Kuma com URL única — alerta se backup não rodar

      ## Solução proposta

      Script `/home/deploy/scripts/backup-vaultwarden.sh` (esboço em `docs/automacoes/vaultwarden.md`), cron `0 3 * * *` com pipe para Uptime Kuma push em sucesso/falha.

      ## Critério de aceite

      - [ ] Script + crontab provisionados via Ansible (não manual)
      - [ ] Backup roda diário e aparece no bucket
      - [ ] Retenção 30d testada
      - [ ] Restore documentado e testado uma vez
      - [ ] Uptime Kuma alerta se cron não rodar ou falhar

      ## Esforço / Impacto

      Baixo / Alto

      ## Referências

      - `docs/automacoes/vaultwarden.md` (ideia #2)

